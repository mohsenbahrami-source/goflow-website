<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GoFlow — Smart tools for every investor." />
  <meta name="theme-color" content="#f7fbff" />
  <title>GoFlow — Coming Soon</title>

  <style>
    :root {
      --bg: #f7fbff;
      --bg-2: #ffffff;
      --ink: #111111;
      --navy: #17264c;
      --blue: #2e59db;
      --blue-2: #4b78ff;
      --text: #22324d;
      --muted: #6f7c92;
      --line: rgba(23, 38, 76, 0.08);
      --line-strong: rgba(46, 89, 219, 0.14);
      --shadow: 0 30px 90px rgba(23, 38, 76, 0.10);
      --mouse-x: 50%;
      --mouse-y: 50%;
      --max-width: 1240px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(46, 89, 219, 0.08), transparent 24rem),
        radial-gradient(circle at 16% 18%, rgba(46, 89, 219, 0.06), transparent 28rem),
        radial-gradient(circle at 84% 14%, rgba(23, 38, 76, 0.05), transparent 26rem),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      width: 100%;
      isolation: isolate;
      overflow: hidden;
    }

    #particle-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(46, 89, 219, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 89, 219, 0.028) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.95), rgba(0,0,0,0.60) 68%, transparent 100%);
    }

    .ambient-glow {
      position: fixed;
      left: var(--mouse-x);
      top: var(--mouse-y);
      width: 460px;
      height: 460px;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(46, 89, 219, 0.12), transparent 72%);
      filter: blur(22px);
    }

    header {
      position: relative;
      z-index: 3;
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 28px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 28px rgba(23, 38, 76, 0.06);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--navy);
      white-space: nowrap;
    }

    .top-pill.brand::before,
    .top-pill.status::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .top-pill.brand::before {
      background: linear-gradient(135deg, var(--ink), var(--blue));
      box-shadow: 0 0 0 7px rgba(46, 89, 219, 0.08);
    }

    .top-pill.status::before {
      background: var(--blue);
      box-shadow: 0 0 0 7px rgba(46, 89, 219, 0.08);
      animation: pulse 2.6s ease-out infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(46, 89, 219, 0.25); }
      70% { box-shadow: 0 0 0 13px rgba(46, 89, 219, 0); }
      100% { box-shadow: 0 0 0 0 rgba(46, 89, 219, 0); }
    }

    main {
      position: relative;
      z-index: 3;
      min-height: calc(100vh - 130px);
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 24px 28px 40px;
      display: grid;
      place-items: center;
    }

    .hero-shell {
      position: relative;
      width: 100%;
      max-width: 1100px;
      min-height: 650px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 38px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.60)),
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(46, 89, 219, 0.07), transparent 24rem);
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 28px;
      border: 1px solid rgba(46, 89, 219, 0.08);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 860px;
      padding: 56px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 24px;
    }

    .logo-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 22px 28px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.34);
      backdrop-filter: blur(12px);
      box-shadow: 0 16px 46px rgba(23, 38, 76, 0.07);
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: -14px;
      border-radius: 40px;
      background: radial-gradient(circle, rgba(46, 89, 219, 0.10), transparent 72%);
      z-index: -1;
    }

    .hero-logo {
      display: block;
      width: min(78vw, 690px);
      max-width: 690px;
      min-width: 290px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 12px 28px rgba(46, 89, 219, 0.08));
    }

    .tagline {
      color: var(--navy);
      font-size: clamp(1.5rem, 2vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.2;
    }

    .subtitle {
      max-width: 700px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(16px);
      box-shadow: 0 14px 34px rgba(23, 38, 76, 0.06);
      color: var(--navy);
      font-size: 0.96rem;
      font-weight: 750;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .meta-pill:hover {
      transform: translateY(-2px);
      border-color: rgba(46, 89, 219, 0.22);
      box-shadow: 0 18px 40px rgba(23, 38, 76, 0.08);
    }

    .meta-pill.primary {
      background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
      color: #ffffff;
      border-color: transparent;
      box-shadow: 0 16px 42px rgba(46, 89, 219, 0.22);
    }

    .meta-pill.email {
      color: var(--blue);
      font-weight: 800;
    }

    .micro-line {
      width: 150px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(46, 89, 219, 0.42), transparent);
      margin-top: 2px;
    }

    footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 22px;
      z-index: 3;
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      justify-content: center;
      text-align: center;
    }

    .footer-copy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(16px);
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 10px 28px rgba(23, 38, 76, 0.06);
    }

    @media (max-width: 920px) {
      .hero-shell {
        min-height: 590px;
      }

      .hero-content {
        padding: 48px 24px;
      }

      .hero-logo {
        width: min(82vw, 560px);
      }

      .tagline {
        font-size: clamp(1.3rem, 3.6vw, 1.8rem);
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      header {
        flex-direction: column;
        align-items: stretch;
      }

      .top-pill {
        justify-content: center;
      }

      main {
        min-height: auto;
        padding-bottom: 110px;
      }

      .hero-shell {
        min-height: 520px;
        border-radius: 28px;
      }

      .hero-content {
        gap: 20px;
        padding: 36px 20px;
      }

      .logo-wrap {
        padding: 18px 18px;
      }

      .hero-logo {
        width: min(86vw, 460px);
        min-width: 220px;
      }

      .subtitle {
        font-size: 0.98rem;
      }

      .meta-row {
        flex-direction: column;
        width: 100%;
      }

      .meta-pill {
        width: 100%;
      }

      footer {
        position: static;
        padding-bottom: 24px;
      }

      .footer-copy {
        line-height: 1.4;
        padding: 10px 16px;
        min-height: auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="grid-overlay" aria-hidden="true"></div>
  <div class="ambient-glow" aria-hidden="true"></div>

  <div class="page">
    <header>
      <div class="top-pill brand">GoFlow</div>
      <div class="top-pill status">Platform preparing for launch</div>
    </header>

    <main>
      <section class="hero-shell" aria-label="GoFlow coming soon">
        <div class="hero-content">
          <div class="logo-wrap">
            <img src="logo.png" alt="GoFlow logo" class="hero-logo" />
          </div>

          <div class="tagline">Smart tools for every investor.</div>

          <p class="subtitle">
            GoFlow is preparing a modern financial technology platform designed for clarity,
            intelligent structure, and disciplined decision-making.
          </p>

          <div class="meta-row">
            <div class="meta-pill primary">Coming Soon</div>
            <a class="meta-pill email" href="mailto:info@goflow-ai.com">info@goflow-ai.com</a>
          </div>

          <div class="micro-line"></div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-copy">© <span id="year"></span> GoFlow. All rights reserved.</div>
    </footer>
  </div>

  <script>
    const root = document.documentElement;
    const yearEl = document.getElementById("year");
    yearEl.textContent = new Date().getFullYear();

    window.addEventListener("mousemove", (event) => {
      root.style.setProperty("--mouse-x", `${event.clientX}px`);
      root.style.setProperty("--mouse-y", `${event.clientY}px`);
      mouse.x = event.clientX;
      mouse.y = event.clientY;
    });

    const canvas = document.getElementById("particle-canvas");
    const ctx = canvas.getContext("2d");

    let particles = [];
    let mouse = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      radius: 150
    };

    function setCanvasSize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildParticles();
    }

    function buildParticles() {
      particles = [];
      const area = window.innerWidth * window.innerHeight;
      const count = Math.min(2200, Math.max(1200, Math.floor(area / 850)));

      for (let i = 0; i < count; i++) {
        const clusterBias = Math.random();
        const baseSpeed = 0.05 + Math.random() * 0.12;

        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          vx: (Math.random() - 0.5) * baseSpeed,
          vy: (Math.random() - 0.5) * baseSpeed,
          size: 0.35 + Math.random() * 0.85,
          alpha: 0.14 + Math.random() * 0.35,
          phase: Math.random() * Math.PI * 2,
          drift: 0.2 + Math.random() * 0.5,
          bias: clusterBias
        });
      }
    }

    function drawParticle(p) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(46, 89, 219, ${p.alpha})`;
      ctx.fill();
    }

    function updateParticles(time) {
      const t = time * 0.00012;

      for (const p of particles) {
        const flowX = Math.cos((p.y * 0.004) + t + p.phase) * 0.08;
        const flowY = Math.sin((p.x * 0.004) - t + p.phase) * 0.08;

        p.x += p.vx + flowX + Math.cos(t + p.phase) * p.drift * 0.015;
        p.y += p.vy + flowY + Math.sin(t + p.phase) * p.drift * 0.015;

        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const distSq = dx * dx + dy * dy;
        const radiusSq = mouse.radius * mouse.radius;

        if (distSq < radiusSq) {
          const dist = Math.sqrt(distSq) || 1;
          const force = (mouse.radius - dist) / mouse.radius;
          p.x += (dx / dist) * force * 1.0;
          p.y += (dy / dist) * force * 1.0;
        }

        if (p.x < -20) p.x = window.innerWidth + 20;
        if (p.x > window.innerWidth + 20) p.x = -20;
        if (p.y < -20) p.y = window.innerHeight + 20;
        if (p.y > window.innerHeight + 20) p.y = -20;
      }
    }

    function drawStructuredField(time) {
      ctx.save();
      ctx.lineWidth = 0.5;

      const verticalGap = 52;
      const horizontalGap = 52;
      const timeA = time * 0.00055;
      const timeB = time * 0.00045;

      for (let x = 0; x < window.innerWidth; x += verticalGap) {
        ctx.beginPath();

        for (let y = 0; y <= window.innerHeight; y += 18) {
          const wave = Math.sin((y * 0.012) + timeA + x * 0.003) * 6;
          const influenceX = (mouse.x - x) * 0.0009 * Math.exp(-Math.abs(mouse.y - y) / 220);
          const px = x + wave + influenceX;

          if (y === 0) ctx.moveTo(px, y);
          else ctx.lineTo(px, y);
        }

        ctx.strokeStyle = "rgba(46, 89, 219, 0.035)";
        ctx.stroke();
      }

      for (let y = 0; y < window.innerHeight; y += horizontalGap) {
        ctx.beginPath();

        for (let x = 0; x <= window.innerWidth; x += 18) {
          const wave = Math.cos((x * 0.012) + timeB + y * 0.003) * 6;
          const influenceY = (mouse.y - y) * 0.0009 * Math.exp(-Math.abs(mouse.x - x) / 220);
          const py = y + wave + influenceY;

          if (x === 0) ctx.moveTo(x, py);
          else ctx.lineTo(x, py);
        }

        ctx.strokeStyle = "rgba(46, 89, 219, 0.03)";
        ctx.stroke();
      }

      ctx.restore();
    }

    function connectParticles() {
      ctx.save();

      for (let i = 0; i < particles.length; i += 3) {
        const a = particles[i];

        for (let j = i + 1; j < Math.min(i + 16, particles.length); j++) {
          const b = particles[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 26) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(46, 89, 219, ${0.028 * (1 - dist / 26)})`;
            ctx.lineWidth = 0.45;
            ctx.stroke();
          }
        }
      }

      ctx.restore();
    }

    function animate(time = 0) {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      drawStructuredField(time);
      updateParticles(time);
      connectParticles();

      for (const p of particles) {
        drawParticle(p);
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", setCanvasSize);

    setCanvasSize();
    animate();
  </script>
</body>
</html>
