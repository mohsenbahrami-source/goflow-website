<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GoFlow — Smart tools for every investor. Coming soon." />
  <meta name="theme-color" content="#ffffff" />
  <title>GoFlow — Coming Soon</title>

  <style>
    :root {
      --bg: #f8fafc;
      --bg-soft: #eef2f7;
      --ink: #0f172a;
      --text: #475569;
      --line: #dbe3ee;
      --blue: #2d59db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 32px 24px 20px;
    }

    main {
      display: grid;
      place-items: center;
    }

    .content {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .brand {
      display: inline-block;
      margin-bottom: 18px;
      font-size: clamp(2rem, 4.2vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .brand .go {
      color: #111111;
    }

    .brand .flow {
      color: var(--blue);
    }

    .eyebrow {
      margin-bottom: 18px;
      color: var(--blue);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 24px;
      font-size: clamp(2.6rem, 6vw, 5rem);
      line-height: 0.98;
      letter-spacing: -0.06em;
      font-weight: 700;
      color: var(--ink);
    }

    .text {
      max-width: 620px;
      margin: 0 auto 34px;
      color: var(--text);
      font-size: clamp(0.98rem, 1.2vw, 1.08rem);
      line-height: 1.8;
      font-weight: 400;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.94rem;
      font-weight: 500;
    }

    .pill.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #ffffff;
    }

    .pill.email {
      color: var(--blue);
      background: #ffffff;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 400;
      text-align: center;
    }

    @media (max-width: 640px) {
      .page {
        padding: 24px 18px 18px;
      }

      .actions {
        flex-direction: column;
        width: 100%;
      }

      .pill {
        width: 100%;
      }

      h1 {
        font-size: clamp(2.2rem, 12vw, 3.6rem);
      }

      .brand {
        font-size: clamp(1.9rem, 8vw, 2.6rem);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <section class="content" aria-label="GoFlow coming soon">
        <div class="brand">
          <span class="go">Go</span><span class="flow">Flow</span>
        </div>

        <div class="eyebrow">Official website</div>

        <h1>Smart tools for every investor.</h1>

        <p class="text">
          GoFlow is preparing a modern financial technology platform built for clarity,
          intelligent structure, and disciplined investor decision-making.
        </p>

        <div class="actions">
          <div class="pill primary">Coming Soon</div>
          <a class="pill email" href="mailto:info@goflow-ai.com">info@goflow-ai.com</a>
        </div>
      </section>
    </main>

    <footer>
      © <span id="year"></span>&nbsp;GoFlow. All rights reserved.
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
