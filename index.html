<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GoFlow — Coming Soon" />
  <meta name="theme-color" content="#f7fbff" />
  <title>GoFlow — Coming Soon</title>

  <style>
    :root {
      --bg: #f7fbff;
      --bg-soft: #ffffff;
      --ink: #111111;
      --navy: #16254b;
      --blue: #2d59db;
      --blue-soft: rgba(45, 89, 219, 0.14);
      --line: rgba(22, 37, 75, 0.08);
      --text-soft: #6f7b91;
      --shadow: 0 28px 90px rgba(22, 37, 75, 0.10);
      --max-width: 1240px;
      --mouse-x: 50%;
      --mouse-y: 50%;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--navy);
      background:
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(45, 89, 219, 0.10), transparent 22rem),
        radial-gradient(circle at 15% 20%, rgba(45, 89, 219, 0.08), transparent 24rem),
        radial-gradient(circle at 82% 14%, rgba(22, 37, 75, 0.06), transparent 24rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      min-height: 100vh;
      width: 100%;
      isolation: isolate;
      overflow: hidden;
    }

    #particle-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(45, 89, 219, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 89, 219, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 50% 45%, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.4) 55%, transparent 100%);
    }

    .ambient-glow {
      position: fixed;
      left: var(--mouse-x);
      top: var(--mouse-y);
      width: 540px;
      height: 540px;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(45, 89, 219, 0.12), transparent 70%);
      filter: blur(22px);
    }

    header {
      position: relative;
      z-index: 3;
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 28px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand-chip,
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 32px rgba(22, 37, 75, 0.06);
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--navy);
      white-space: nowrap;
    }

    .brand-chip::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--ink), var(--blue));
      box-shadow: 0 0 0 7px rgba(45, 89, 219, 0.08);
    }

    .status-chip::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--blue);
      box-shadow: 0 0 0 7px rgba(45, 89, 219, 0.08);
      animation: pulse 2.6s ease-out infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(45, 89, 219, 0.24);
      }
      70% {
        box-shadow: 0 0 0 13px rgba(45, 89, 219, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(45, 89, 219, 0);
      }
    }

    main {
      position: relative;
      z-index: 3;
      min-height: calc(100vh - 130px);
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 24px 28px 40px;
      display: grid;
      place-items: center;
    }

    .hero-shell {
      position: relative;
      width: 100%;
      max-width: 1100px;
      min-height: 620px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(22, 37, 75, 0.08);
      border-radius: 36px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.58)),
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(45, 89, 219, 0.09), transparent 24rem);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(45, 89, 219, 0.08), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,0.18), transparent);
    }

    .hero-shell::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 28px;
      border: 1px solid rgba(45, 89, 219, 0.08);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      width: 100%;
      padding: 56px 40px;
      text-align: center;
    }

    .logo-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.34);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 54px rgba(22, 37, 75, 0.08);
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: 38px;
      background: radial-gradient(circle, rgba(45, 89, 219, 0.10), transparent 72%);
      z-index: -1;
    }

    .hero-logo {
      display: block;
      width: min(76vw, 640px);
      max-width: 640px;
      min-width: 280px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 14px 34px rgba(45, 89, 219, 0.10));
    }

    .coming-soon {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 54px;
      padding: 0 22px;
      border: 1px solid rgba(45, 89, 219, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 40px rgba(22, 37, 75, 0.08);
      color: var(--navy);
      font-size: clamp(1rem, 1.4vw, 1.08rem);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .coming-soon::before {
      content: "";
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--blue);
      box-shadow: 0 0 0 8px rgba(45, 89, 219, 0.08);
    }

    .micro-line {
      width: 130px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(45, 89, 219, 0.42), transparent);
    }

    footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 22px;
      z-index: 3;
      width: min(100%, var(--max-width));
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .footer-copy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(22, 37, 75, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(18px);
      color: var(--text-soft);
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 10px 28px rgba(22, 37, 75, 0.06);
    }

    @media (max-width: 900px) {
      header {
        padding-top: 22px;
      }

      .hero-shell {
        min-height: 560px;
      }

      .hero-content {
        padding: 44px 24px;
      }

      .hero-logo {
        width: min(82vw, 520px);
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      header {
        flex-direction: column;
        align-items: stretch;
      }

      .brand-chip,
      .status-chip {
        justify-content: center;
      }

      main {
        min-height: auto;
        padding-bottom: 110px;
      }

      .hero-shell {
        min-height: 480px;
        border-radius: 28px;
      }

      .hero-content {
        gap: 22px;
      }

      .logo-wrap {
        padding: 18px 18px;
      }

      .hero-logo {
        width: min(84vw, 420px);
      }

      .coming-soon {
        padding: 0 18px;
        font-size: 0.96rem;
      }

      footer {
        position: static;
        padding-bottom: 24px;
      }

      .footer-copy {
        line-height: 1.4;
        padding: 10px 16px;
        min-height: auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="grid-overlay" aria-hidden="true"></div>
  <div class="ambient-glow" aria-hidden="true"></div>

  <div class="page">
    <header>
      <div class="brand-chip">GoFlow</div>
      <div class="status-chip">Platform preparing for launch</div>
    </header>

    <main>
      <section class="hero-shell" aria-label="GoFlow coming soon">
        <div class="hero-content">
          <div class="logo-wrap">
            <img src="logo.png" alt="GoFlow" class="hero-logo" />
          </div>

          <div class="micro-line"></div>

          <div class="coming-soon">Coming Soon</div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-copy">© <span id="year"></span> GoFlow. All rights reserved.</div>
    </footer>
  </div>

  <script>
    const root = document.documentElement;
    const yearEl = document.getElementById("year");
    yearEl.textContent = new Date().getFullYear();

    window.addEventListener("mousemove", (event) => {
      root.style.setProperty("--mouse-x", `${event.clientX}px`);
      root.style.setProperty("--mouse-y", `${event.clientY}px`);
    });

    const canvas = document.getElementById("particle-canvas");
    const ctx = canvas.getContext("2d");

    let particles = [];
    let mouse = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      radius: 180
    };

    function setCanvasSize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildParticles();
    }

    function buildParticles() {
      particles = [];
      const area = window.innerWidth * window.innerHeight;
      const count = Math.min(1400, Math.max(700, Math.floor(area / 1400)));

      for (let i = 0; i < count; i++) {
        const band = i % 7;
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          baseX: Math.random() * window.innerWidth,
          baseY: Math.random() * window.innerHeight,
          vx: (Math.random() - 0.5) * (0.18 + band * 0.012),
          vy: (Math.random() - 0.5) * (0.18 + band * 0.012),
          size: Math.random() * 1.4 + 0.25,
          alpha: Math.random() * 0.45 + 0.18,
          phase: Math.random() * Math.PI * 2,
          drift: Math.random() * 0.6 + 0.15
        });
      }
    }

    function drawParticle(p) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

      const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
      gradient.addColorStop(0, `rgba(45, 89, 219, ${p.alpha})`);
      gradient.addColorStop(0.55, `rgba(45, 89, 219, ${p.alpha * 0.45})`);
      gradient.addColorStop(1, "rgba(45, 89, 219, 0)");

      ctx.fillStyle = gradient;
      ctx.fill();
    }

    function drawFieldLines() {
      const spacing = 90;
      ctx.save();
      ctx.strokeStyle = "rgba(45, 89, 219, 0.04)";
      ctx.lineWidth = 1;

      for (let x = 0; x < window.innerWidth; x += spacing) {
        ctx.beginPath();
        for (let y = 0; y <= window.innerHeight; y += 16) {
          const dx = x - mouse.x;
          const dy = y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const force = Math.max(0, (mouse.radius * 1.2 - dist) / (mouse.radius * 1.2));
          const offsetX = (dx / dist) * force * 16;
          const wave = Math.sin((y + x) * 0.008 + performance.now() * 0.001) * 5;
          const px = x + offsetX + wave;

          if (y === 0) {
            ctx.moveTo(px, y);
          } else {
            ctx.lineTo(px, y);
          }
        }
        ctx.stroke();
      }

      for (let y = 0; y < window.innerHeight; y += spacing) {
        ctx.beginPath();
        for (let x = 0; x <= window.innerWidth; x += 16) {
          const dx = x - mouse.x;
          const dy = y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const force = Math.max(0, (mouse.radius - dist) / mouse.radius);
          const offsetY = (dy / dist) * force * 12;
          const wave = Math.cos((x + y) * 0.008 + performance.now() * 0.0012) * 5;
          const py = y + offsetY + wave;

          if (x === 0) {
            ctx.moveTo(x, py);
          } else {
            ctx.lineTo(x, py);
          }
        }
        ctx.stroke();
      }

      ctx.restore();
    }

    function updateParticles(time) {
      for (const p of particles) {
        const noiseX = Math.cos(time * 0.00025 + p.phase) * p.drift;
        const noiseY = Math.sin(time * 0.00022 + p.phase) * p.drift;

        p.x += p.vx + noiseX * 0.02;
        p.y += p.vy + noiseY * 0.02;

        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const distSq = dx * dx + dy * dy;
        const radiusSq = mouse.radius * mouse.radius;

        if (distSq < radiusSq) {
          const dist = Math.sqrt(distSq) || 1;
          const force = (mouse.radius - dist) / mouse.radius;
          p.x += (dx / dist) * force * 0.9;
          p.y += (dy / dist) * force * 0.9;
        }

        if (p.x < -30) p.x = window.innerWidth + 30;
        if (p.x > window.innerWidth + 30) p.x = -30;
        if (p.y < -30) p.y = window.innerHeight + 30;
        if (p.y > window.innerHeight + 30) p.y = -30;
      }
    }

    function connectParticles() {
      ctx.save();

      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];

        for (let j = i + 1; j < Math.min(i + 12, particles.length); j++) {
          const b = particles[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 42) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(45, 89, 219, ${0.05 * (1 - dist / 42)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      ctx.restore();
    }

    function animate(time = 0) {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      drawFieldLines();
      updateParticles(time);
      connectParticles();

      for (const p of particles) {
        drawParticle(p);
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("mousemove", (event) => {
      mouse.x = event.clientX;
      mouse.y = event.clientY;
    });

    window.addEventListener("resize", setCanvasSize);

    setCanvasSize();
    animate();
  </script>
</body>
</html>
