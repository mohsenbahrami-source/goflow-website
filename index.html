<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GoFlow — Smart tools for every investor. Coming soon." />
  <meta name="theme-color" content="#ffffff" />
  <title>GoFlow — Coming Soon</title>

  <style>
    :root {
      --bg: #ffffff;
      --soft-bg: #f7f9fc;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --blue: #2d59db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(45, 89, 219, 0.045), transparent 32rem),
        linear-gradient(180deg, #ffffff 0%, var(--soft-bg) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 28px;
    }

    header {
      width: min(100%, 1080px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
    }

    .brand img {
      height: 34px;
      width: auto;
      display: block;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--blue);
    }

    main {
      width: min(100%, 1080px);
      margin: 0 auto;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 80px 0;
    }

    .content {
      max-width: 720px;
    }

    .logo-main {
      width: min(72vw, 460px);
      height: auto;
      display: block;
      margin: 0 auto 34px;
    }

    .label {
      margin-bottom: 18px;
      color: var(--blue);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 20px;
      color: var(--ink);
      font-size: clamp(2.1rem, 5vw, 4.4rem);
      line-height: 1.04;
      letter-spacing: -0.055em;
      font-weight: 700;
    }

    .text {
      max-width: 620px;
      margin: 0 auto 32px;
      color: var(--muted);
      font-size: clamp(1rem, 1.25vw, 1.08rem);
      line-height: 1.75;
      font-weight: 400;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      font-size: 0.94rem;
      font-weight: 500;
    }

    .pill.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
    }

    .pill.email {
      color: var(--blue);
    }

    footer {
      width: min(100%, 1080px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 10px;
      color: #9ca3af;
      font-size: 0.82rem;
      font-weight: 400;
    }

    @media (max-width: 640px) {
      .page {
        padding: 22px;
      }

      header {
        flex-direction: column;
        align-items: center;
      }

      .brand img {
        height: 30px;
      }

      main {
        padding: 58px 0;
      }

      .logo-main {
        width: min(82vw, 380px);
        margin-bottom: 28px;
      }

      .actions {
        width: 100%;
        flex-direction: column;
      }

      .pill {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="brand" href="/" aria-label="GoFlow home">
        <img src="./logo.png" alt="GoFlow" />
      </a>

      <div class="status">Coming soon</div>
    </header>

    <main>
      <section class="content" aria-label="GoFlow coming soon">
        <img class="logo-main" src="./logo.png" alt="GoFlow" />

        <div class="label">Official website</div>

        <h1>Smart tools for every investor.</h1>

        <p class="text">
          GoFlow is preparing a modern financial technology platform focused on clarity,
          intelligent structure, and disciplined investor decision-making.
        </p>

        <div class="actions">
          <div class="pill primary">Coming Soon</div>
          <a class="pill email" href="mailto:info@goflow-ai.com">info@goflow-ai.com</a>
        </div>
      </section>
    </main>

    <footer>
      © <span id="year"></span>&nbsp;GoFlow. All rights reserved.
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
